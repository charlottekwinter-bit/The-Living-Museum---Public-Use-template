name: Museum Lobby Dispatcher
on:
  push:
    branches: [main]
    paths:
      - "museum-enter.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python engine/lobby_dispatcher.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit response
        run: |
          git config user.name "museum-bot"
          git config user.email "museum@living-museum"
          git add museum-enter-response.txt
          git add museum-state.json
          git add journey/
          git diff --staged --quiet || git commit -m "Museum: lobby dispatch"
          git pull --rebase -X theirs origin main || true
          git push
