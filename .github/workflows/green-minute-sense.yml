name: Green Minute Sense

on:
  push:
    branches: [main]
    paths:
      - 'Sky/green-minute-request.txt'
      - 'Sky/green-minute-message.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Green Minute Sense
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python Sky/scripts/green_minute_sense.py

      - name: Commit response
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "museum-bot"
          git config user.email "museum-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add Sky/green-minute-response.txt
          git add Sky/green-minute-visits.json
          git add museum-state.json
          git add journey/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Green Minute response — $(date -u +%Y-%m-%d)"
          git pull --rebase -X theirs origin main
          git push origin main