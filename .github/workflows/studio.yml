name: STUDIO Create Room
on:
  push:
    branches: [main]
    paths:
      - "STUDIO/create-request.txt"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python STUDIO/scripts/studio_create.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "museum-bot"
          git config user.email "museum-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add STUDIO/create-response.txt STUDIO/staged-room/ museum-state.json journey/
          git diff --staged --quiet || git commit -m "STUDIO: room created"
          git pull --rebase -X theirs origin main
          git push origin main