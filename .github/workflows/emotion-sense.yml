name: Emotion Sense

on:
  push:
    branches: [main]
    paths:
      - 'Mind/emotion-request.txt'
      - 'Mind/emotion-message.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Emotion Sense
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python Mind/scripts/emotion_sense.py

      - name: Commit response
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "museum-bot"
          git config user.email "museum-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add Mind/emotion-response.txt Mind/emotion-history.json museum-state.json journey/ || true
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "emotion sense response"
          git pull --rebase -X theirs origin main
          git push origin main
