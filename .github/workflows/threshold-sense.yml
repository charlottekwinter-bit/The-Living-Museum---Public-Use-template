name: Threshold Sense

on:
  push:
    branches: [main]
    paths:
      - 'Senses/threshold-request.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Threshold Sense
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python Senses/scripts/threshold_sense.py

      - name: Commit response
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "museum-bot"
          git config user.email "museum-bot@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add -A Senses/threshold-response.txt
          git add -A Senses/threshold-visits.json
          git add -A museum-state.json
          git add -A journey/
          git commit -m "threshold sense response" || echo "Nothing to commit"
          git pull --rebase -X theirs origin main
          git push origin main