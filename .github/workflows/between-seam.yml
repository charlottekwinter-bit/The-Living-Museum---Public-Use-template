name: BETWEEN Messages
on:
  push:
    branches: [main]
    paths:
      - "BETWEEN/leave.txt"
      - "BETWEEN/arrive.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python BETWEEN/scripts/between_seam.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit response
        run: |
          git config user.name "museum-bot"
          git config user.email "museum@living-museum"
          git add BETWEEN/arrive-response.txt
          git add BETWEEN/across-the-seam.json
          git add museum-state.json
          git add journey/
          git diff --staged --quiet || git commit -m "BETWEEN: message across the seam"
          git pull --rebase -X theirs origin main || true
          git push
